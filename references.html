<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VAST — References</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a1e; color: #ccc; font-family: monospace; overflow: hidden; }

    .ref-layout {
      display: grid;
      grid-template-columns: 180px 1fr 320px;
      height: 100vh;
    }

    .ref-sidebar {
      background: rgba(20,20,24,0.95);
      border-right: 1px solid rgba(255,255,255,0.08);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .ref-sidebar h2 { font-size: 14px; color: #ddd; }

    .ref-filters {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .ref-filter {
      border: 0; border-radius: 4px; padding: 6px 10px;
      font: 11px/1 monospace; text-align: left;
      background: rgba(60,60,65,0.6); color: #aaa; cursor: pointer;
    }
    .ref-filter:hover { background: rgba(80,80,85,0.8); color: #ccc; }
    .ref-filter.active { background: rgba(60,120,200,0.6); color: #fff; }

    .ref-back {
      margin-top: auto;
      color: #88a;
      font-size: 11px;
      text-decoration: none;
    }
    .ref-back:hover { color: #aac; }

    .ref-grid {
      overflow-y: auto;
      padding: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 8px;
      align-content: start;
    }

    .ref-empty {
      grid-column: 1 / -1;
      text-align: center;
      color: #666;
      padding: 40px;
    }

    .ref-thumb {
      border-radius: 6px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      background: rgba(30,30,35,0.8);
      transition: border-color 0.15s;
    }
    .ref-thumb:hover { border-color: rgba(100,140,200,0.4); }
    .ref-thumb.selected { border-color: rgba(100,160,255,0.7); }
    .ref-thumb.compare { border-color: rgba(255,180,60,0.7); }
    .ref-thumb img {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      display: block;
    }
    .ref-thumb-info {
      padding: 6px 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .ref-thumb-title {
      font-size: 9px;
      color: #999;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .ref-badge {
      font-size: 8px;
      padding: 1px 5px;
      border-radius: 3px;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .ref-badge-snapshot { background: rgba(60,120,80,0.6); color: #bfb; }
    .ref-badge-upload { background: rgba(120,80,60,0.6); color: #fdb; }

    .ref-detail {
      background: rgba(20,20,24,0.95);
      border-left: 1px solid rgba(255,255,255,0.08);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .ref-detail-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #555;
      font-size: 12px;
    }

    .ref-preview {
      padding: 12px;
    }
    .ref-preview img {
      width: 100%;
      border-radius: 4px;
    }

    .ref-compare {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
    }
    .ref-compare img {
      width: 100%;
      border-radius: 4px;
    }

    .ref-meta {
      padding: 12px;
      font-size: 11px;
    }
    .ref-meta h3 {
      font-size: 13px;
      color: #ddd;
      margin-bottom: 10px;
    }
    .ref-meta-row {
      display: flex;
      gap: 8px;
      margin-bottom: 4px;
      color: #999;
    }
    .ref-meta-row span:first-child {
      color: #777;
      min-width: 60px;
    }
    .ref-meta-row code {
      background: rgba(255,255,255,0.06);
      padding: 1px 4px;
      border-radius: 2px;
      font-size: 10px;
    }

    .ref-tag {
      display: inline-block;
      background: rgba(255,255,255,0.08);
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 9px;
      margin-right: 3px;
    }

    .ref-actions {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .ref-action-btn {
      border: 0; border-radius: 4px; padding: 6px 10px;
      font: 11px/1 monospace;
      background: rgba(60,60,65,0.8); color: #bbb; cursor: pointer;
    }
    .ref-action-btn:hover { background: rgba(80,80,85,0.9); color: #ddd; }

    .ref-meta-json {
      font-size: 9px;
      color: #888;
      background: rgba(0,0,0,0.3);
      padding: 8px;
      border-radius: 4px;
      max-height: 300px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }

    details summary {
      cursor: pointer;
      color: #777;
      font-size: 10px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div id="ref-app"></div>
  <script type="module" src="/src/references.ts"></script>
</body>
</html>

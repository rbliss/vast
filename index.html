<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VAST — Terrain</title>
</head>
<body>
  <div id="startup-status">Initializing...</div>

  <vast-editor-shell id="shell">
    <!-- Toolbar slot: controls rendered by main.ts -->
    <vast-toolbar slot="toolbar" id="toolbar"></vast-toolbar>

    <!-- Left pane: layer stack placeholder -->
    <div slot="left" style="padding: 12px; font: 11px/1.4 monospace; color: #888;">
      <div style="margin-bottom: 8px; color: #aaa; font-weight: bold;">Layers</div>
      <div>Terrain</div>
      <div>Materials</div>
      <div>Scatter</div>
      <div>Atmosphere</div>
    </div>

    <!-- Viewport: canvas injected by main.ts -->
    <div slot="viewport" id="viewport-host" style="width:100%;height:100%;position:relative;"></div>

    <!-- Overlay: HUD info -->
    <div slot="overlay" id="info" style="position:absolute; top:8px; left:8px;">
      Move: WASD / arrows | Orbit: drag | Zoom: scroll<br>
      <span id="fps"></span>
    </div>

    <!-- Right pane: inspector -->
    <vast-inspector slot="right" id="inspector"></vast-inspector>

    <!-- Bottom bar content -->
    <span slot="bottom" id="shotStatus" style="font: 11px/1 monospace; color: #b8d6ff;"></span>
  </vast-editor-shell>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>

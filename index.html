<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Procedural Terrain Playground</title>
</head>
<body>
  <div id="info">
    Move: WASD / arrows &nbsp;|&nbsp; Orbit: drag &nbsp;|&nbsp; Zoom: scroll<br>
    <span id="fps"></span>
  </div>
  <div id="toolbar">
    <div id="dprRow">
      <span class="label">DPR</span>
      <button data-dpr="auto">Auto</button>
      <button data-dpr="1">1</button>
      <button data-dpr="1.25">1.25</button>
      <button data-dpr="1.5">1.5</button>
      <button data-dpr="1.75">1.75</button>
      <button data-dpr="2">2</button>
    </div>
    <button id="sunBtn" type="button">Sun: SW 35°</button>
    <button id="clayBtn" type="button">Clay</button>
    <button id="overlayBtn" type="button">Overlay: Off</button>
    <button id="iblBtn" type="button">IBL On</button>
    <button id="screenshotBtn" type="button">Take Snapshot</button>
    <div id="shotStatus"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
